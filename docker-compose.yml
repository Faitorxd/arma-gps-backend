version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: armas_gps_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: armas_gps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Opcional: Interfaz gráfica pgAdmin para ver la base de datos
  pgadmin:
    image: dpage/pgadmin4
    container_name: armas_gps_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
